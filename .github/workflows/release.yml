name: Release

# Draft-then-publish: pushing a vX.Y.Z tag builds and uploads every asset to
# a DRAFT release, verifies all assets are present, and only then publishes.
# "Published" therefore always means "assets exist" for releases-API
# consumers. Note the Go module proxy resolves the TAG itself, minutes before
# assets finish uploading — the CLI's download retry/backoff covers that
# window. Never delete a released tag (the module proxy caches it forever);
# disavow bad releases with a go.mod retract directive instead.
on:
  push:
    # Exact vX.Y.Z only: the CLI's release-download path rejects prerelease
    # versions, so a v0.5.0-rc1 tag would publish assets nothing can consume.
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  GO_MODULE: github.com/watzon/ship
  BINARY: ship

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Caddy
        run: |
          sudo apt-get update
          sudo apt-get install -y caddy

      - name: Run local verification gates
        env:
          SHIP_DOCS_VERSION_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        run: ./scripts/ci-local.sh

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            goos: linux
            goarch: amd64
            sign: false
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            sign: false
          - runner: macos-15
            goos: darwin
            goarch: arm64
            sign: true
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            sign: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          VERSION="${VERSION#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::release tags must be exact vX.Y.Z (got 'v$VERSION'); prerelease tags have no supported asset path"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building ship $VERSION for ${{ matrix.goos }}/${{ matrix.goarch }}"

      - name: Detect signing config
        id: signing
        if: matrix.sign
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "${APPLE_CERTIFICATE:-}" ] && [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          elif [ -n "${APPLE_CERTIFICATE:-}" ] || [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "::error::Apple signing secrets are PARTIALLY configured — fix or remove them. Refusing to ship a silently-unsigned macOS binary."
            exit 1
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Apple signing secrets not configured — macOS build will be UNSIGNED."
          fi

      - name: Import signing certificate
        if: matrix.sign && steps.signing.outputs.enabled == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          kc_pw="$(openssl rand -base64 24)"
          echo "::add-mask::$kc_pw"
          keychain="$RUNNER_TEMP/signing.keychain-db"
          certpath="$RUNNER_TEMP/cert.p12"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certpath"
          security create-keychain -p "$kc_pw" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$kc_pw" "$keychain"
          security import "$certpath" -k "$keychain" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$kc_pw" "$keychain"
          existing="$(security list-keychains -d user | sed -e 's/[\" ]//g')"
          security list-keychains -d user -s "$keychain" $existing
          rm -f "$certpath"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X ${GO_MODULE}/internal/agent.AgentVersion=${VERSION}" \
            -o "dist/${BINARY}" \
            ./cmd/ship
          chmod +x "dist/${BINARY}"

      - name: Assert stamped version matches tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PRINTED="$("dist/${BINARY}" version | head -n1 | awk '{print $2}')"
          if [ "$PRINTED" != "$VERSION" ]; then
            echo "::error::built binary reports version '$PRINTED', tag says '$VERSION'"
            exit 1
          fi

      - name: Assert static binary (linux)
        if: matrix.goos == 'linux'
        run: |
          # The agent must stay a static pure-Go binary (musl and glibc
          # hosts alike); a cgo dependency would silently break Alpine.
          if ldd "dist/${BINARY}" 2>&1 | grep -vq 'not a dynamic executable'; then
            echo "::error::dist/${BINARY} is dynamically linked"
            ldd "dist/${BINARY}" || true
            exit 1
          fi

      - name: Sign and notarize macOS binary
        if: matrix.sign && steps.signing.outputs.enabled == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          chmod +x ./scripts/sign-macos-binary.sh
          ./scripts/sign-macos-binary.sh "dist/${BINARY}"

      - name: Package archive
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="dist/${BINARY}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -C dist -czf "$ARCHIVE" "${BINARY}"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ship-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

  publish:
    name: Publish release assets
    runs-on: ubuntu-24.04
    needs: build
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: ship-*
          merge-multiple: true

      - name: Create checksum manifest
        run: |
          cd dist
          # sha256sum lines only — extra preamble lines break `sha256sum -c`.
          sha256sum ship_*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Ensure draft release
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --draft --title "ship ${TAG#v}" --generate-notes
          fi

      - name: Upload release assets
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release upload "$TAG" dist/ship_*.tar.gz dist/checksums.txt --clobber

      - name: Verify assets and publish
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          ASSETS="$(gh release view "$TAG" --json assets --jq '.assets[].name')"
          MISSING=0
          for want in \
            "ship_${VERSION}_linux_amd64.tar.gz" \
            "ship_${VERSION}_linux_arm64.tar.gz" \
            "ship_${VERSION}_darwin_amd64.tar.gz" \
            "ship_${VERSION}_darwin_arm64.tar.gz" \
            "checksums.txt"; do
            if ! printf '%s\n' "$ASSETS" | grep -qx "$want"; then
              echo "::error::release $TAG is missing asset $want"
              MISSING=1
            fi
          done
          [ "$MISSING" -eq 0 ]
          gh release edit "$TAG" --draft=false

      - name: Summary
        run: |
          {
            echo "## Release artifacts"
            echo ""
            echo "Published **${{ steps.tag.outputs.tag }}** with:"
            echo ""
            ls -1 dist/ship_*.tar.gz dist/checksums.txt | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

  smoke:
    name: Post-publish smoke test
    runs-on: ubuntu-24.04
    needs: publish
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: go install resolves the tag and self-reports it
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # GOPROXY=direct sidesteps proxy propagation lag right after tagging.
          GOPROXY=direct go install "${GO_MODULE}/cmd/ship@${TAG}"
          PRINTED="$("$(go env GOPATH)/bin/ship" version | head -n1 | awk '{print $2}')"
          if [ "$PRINTED" != "${TAG#v}" ]; then
            echo "::error::go install @$TAG reports version '$PRINTED'"
            exit 1
          fi

      - name: Published assets download and verify
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          curl -fsSL -O "${BASE}/checksums.txt"
          curl -fsSL -O "${BASE}/ship_${VERSION}_linux_amd64.tar.gz"
          grep "ship_${VERSION}_linux_amd64.tar.gz" checksums.txt | sha256sum -c -
          tar -xzf "ship_${VERSION}_linux_amd64.tar.gz" ship
          ./ship version
